<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1a1aa"/>
      <stop offset="50%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dumbbell: center bar -->
  <rect x="136" y="238" width="240" height="36" rx="8" fill="url(#bar)"/>
  <!-- Left plates -->
  <rect x="100" y="196" width="44" height="120" rx="14" fill="url(#plate)"/>
  <rect x="148" y="214" width="28" height="84" rx="10" fill="url(#plate)" opacity="0.85"/>
  <!-- Right plates -->
  <rect x="368" y="196" width="44" height="120" rx="14" fill="url(#plate)"/>
  <rect x="336" y="214" width="28" height="84" rx="10" fill="url(#plate)" opacity="0.85"/>
  <!-- Grip texture lines -->
  <line x1="220" y1="246" x2="220" y2="266" stroke="#27272a" stroke-width="3"/>
  <line x1="256" y1="246" x2="256" y2="266" stroke="#27272a" stroke-width="3"/>
  <line x1="292" y1="246" x2="292" y2="266" stroke="#27272a" stroke-width="3"/>
</svg>
