<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IronLog — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0a0a0a;
    color: #fafafa;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .card { max-width: 320px; }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.5rem;
    background: linear-gradient(135deg, #18181b, #09090b);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #27272a;
  }
  .icon svg { width: 36px; height: 36px; }
  h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 700; }
  p { color: #a1a1aa; font-size: 0.875rem; margin: 0 0 1.5rem; line-height: 1.5; }
  button {
    background: #fafafa;
    color: #0a0a0a;
    border: 0;
    padding: 0.75rem 1.5rem;
    border-radius: 0.5rem;
    font-weight: 600;
    font-size: 0.875rem;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="card">
<div class="icon">
<svg viewBox="0 0 24 24" fill="none" stroke="#fafafa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>
</svg>
</div>
<h1>You're Offline</h1>
<p>IronLog works offline — your routine, sessions, and biometrics are saved locally on your device. Reconnect to sync.</p>
<button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
